<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Driftloop — an endless instrument</title>
<meta name="theme-color" content="#05080d" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#05080d; --ink:#e9eef2; --dim:rgba(233,238,242,0.55);
    --accent:#5f93a8; --line:rgba(233,238,242,0.13);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); }
  body{
    font-family:"Jost",sans-serif; color:var(--ink);
    overflow-x:hidden; overflow-y:auto; overscroll-behavior:none; transition:background 5s ease;
  }
  canvas#bg{ position:fixed; inset:0; z-index:0; display:block; }
  .wrap{
    position:relative; z-index:2; min-height:100svh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:safe center;
    text-align:center; gap:6px;
    padding:calc(env(safe-area-inset-top,0px) + 22px) 20px calc(env(safe-area-inset-bottom,0px) + 28px);
  }
  .eyebrow{ font-size:11.5px; letter-spacing:3.5px; text-transform:uppercase; color:var(--accent); margin:0; transition:color 5s ease; }
  h1{ font-weight:300; font-size:clamp(2rem,7vw,3rem); letter-spacing:0.02em; margin:2px 0 0; }
  .tag{ font-size:12.5px; font-weight:300; color:var(--dim); margin:0 0 4px; max-width:34ch; }

  .orb{
    margin:14px 0 4px; width:118px; height:118px; border-radius:50%;
    border:1px solid var(--line); background:radial-gradient(circle at 50% 42%, rgba(95,147,168,0.2), rgba(95,147,168,0.02) 70%);
    color:var(--ink); font-family:"Jost",sans-serif; font-size:12.5px; letter-spacing:2.5px; text-transform:uppercase;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:border-color .6s, box-shadow 1.6s, transform .3s;
  }
  .orb:hover{ border-color:rgba(95,147,168,0.6); }
  .orb.live{ border-color:rgba(95,147,168,0.65); }
  .orb:active{ transform:scale(0.97); }

  .row{ display:flex; gap:7px; flex-wrap:wrap; justify-content:center; }
  .chip{
    font-family:"Jost",sans-serif; font-size:12.5px; letter-spacing:0.5px;
    color:var(--dim); background:rgba(255,255,255,0.04); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; cursor:pointer; transition:.25s; white-space:nowrap;
  }
  .chip:hover{ color:var(--ink); border-color:rgba(95,147,168,0.5); }
  .chip.on{ color:var(--ink); border-color:var(--accent); background:rgba(95,147,168,0.16); }
  .presets{ margin:8px 0 2px; }
  .presets .chip{ font-size:12px; letter-spacing:1px; text-transform:uppercase; color:rgba(233,238,242,0.7); }
  .scenes{ margin:4px 0 2px; }

  .panel{
    width:min(420px,94vw); margin-top:12px;
    background:rgba(255,255,255,0.025); border:1px solid var(--line); border-radius:16px;
    padding:16px 16px 14px;
    opacity:0; max-height:0; overflow:hidden; pointer-events:none;
    transition:opacity 1s ease, max-height 1s ease;
  }
  .panel.show{ opacity:1; max-height:1600px; overflow:visible; pointer-events:auto; }
  .panel::-webkit-scrollbar{ width:0; }
  .sect{ font-size:10.5px; letter-spacing:2px; text-transform:uppercase; color:rgba(233,238,242,0.34); text-align:left; margin:6px 2px 9px; }
  .sect:first-child{ margin-top:0; }

  /* module row: toggle dot + name + fader */
  .mod{ display:flex; align-items:center; gap:11px; margin-bottom:11px; }
  .dot{
    width:13px; height:13px; border-radius:50%; flex:0 0 13px; cursor:pointer;
    border:1px solid rgba(233,238,242,0.3); background:transparent; transition:.25s; padding:0;
  }
  .dot.on{ background:var(--accent); border-color:var(--accent); box-shadow:0 0 9px rgba(95,147,168,0.6); }
  .mod label{ flex:0 0 64px; text-align:left; font-size:12.5px; letter-spacing:1px; color:var(--ink); }
  .mod.off label{ color:var(--dim); }

  input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:2px; border-radius:2px;
    background:var(--line); outline:none; cursor:pointer; min-width:60px;
  }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); cursor:pointer; }

  .ctl{ display:flex; align-items:center; gap:11px; margin-bottom:11px; }
  .ctl label{ flex:0 0 80px; text-align:left; font-size:11.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }

  .actions{ display:flex; gap:8px; margin-top:4px; }
  .btn{
    flex:1; font-family:"Jost",sans-serif; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--dim); background:rgba(255,255,255,0.04); border:1px solid var(--line);
    border-radius:10px; padding:9px 8px; cursor:pointer; transition:.25s;
  }
  .btn:hover{ color:var(--ink); border-color:rgba(95,147,168,0.5); }
  .btn.rec{ color:#e7867a; border-color:rgba(231,134,122,0.4); }
  .btn.rec.armed{ background:rgba(231,134,122,0.18); color:#ffd9d2; border-color:#e7867a; }
  .foot{ font-size:11px; letter-spacing:1px; color:rgba(233,238,242,0.3); margin-top:12px; }

  /* phones: tighten the vertical stack so the rich panel fits, and let the page scroll */
  @media (max-width:640px){
    .wrap{ gap:3px; padding-top:calc(env(safe-area-inset-top,0px) + 16px); }
    h1{ font-size:1.85rem; }
    .tag{ font-size:12px; margin-bottom:2px; }
    .orb{ width:92px; height:92px; margin:10px 0 2px; }
    .presets{ margin:6px 0 2px; }
    .panel{ margin-top:9px; padding:14px 14px 12px; }
    .mod{ margin-bottom:9px; gap:10px; }
    .mod label{ flex-basis:58px; }
    .ctl{ margin-bottom:9px; }
    .ctl label{ flex-basis:72px; }
    .foot{ margin-top:10px; }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <p class="eyebrow" id="eyebrow">generative ambient · for josh</p>
  <h1>Driftloop</h1>
  <p class="tag">One singing bowl, six layers, endlessly recombined. It never repeats.</p>

  <button class="orb" id="orb">Begin</button>

  <div class="row presets" id="presets"></div>
  <div class="row scenes" id="scenes"></div>

  <div class="panel" id="panel">
    <div class="sect">Layers</div>
    <div id="mods"></div>
    <div class="sect">Field</div>
    <div class="ctl"><label>Movement</label><input id="movement" type="range" min="0" max="1" step="0.01" value="0.3" /></div>
    <div class="ctl"><label>Space</label><input id="space" type="range" min="0" max="1" step="0.01" value="0.72" /></div>
    <div class="ctl"><label>Tape</label><input id="tape" type="range" min="0" max="1" step="0.01" value="0.5" /></div>
    <div class="ctl"><label>Volume</label><input id="vol" type="range" min="0" max="1" step="0.01" value="0.7" /></div>
    <div class="mod" id="tideRow"><button class="dot" id="tideDot" aria-label="tide"></button><label>Tide</label><span style="flex:1;text-align:left;font-size:11.5px;color:var(--dim)">slow self-evolving drift</span></div>
    <div class="actions">
      <button class="btn rec" id="rec">Record</button>
      <button class="btn" id="save">Save mine</button>
    </div>
  </div>

  <p class="foot">headphones, low volume, let it run</p>
</div>

<script>
"use strict";
const mtof = m => 440*Math.pow(2,(m-69)/12);
const rate = s => Math.pow(2, s/12);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

// ---- scenes: chord voicings as semitone offsets from the bowl's own pitch ----
const SCENES = {
  submers: { name:"Submers", color:"#5f93a8", bg:"#05080d", base:50,
    pads:[ [-12,-5,0],[-10,-3,2],[-7,0,5],[-15,-8,-3] ], roots:[0,2,5,-3], tones:[7,12,19,14,24] },
  coast:   { name:"Coast", color:"#7a9a7e", bg:"#070b0a", base:50,
    pads:[ [-12,-7,0],[-10,-5,2],[-8,-3,4],[-14,-9,-2] ], roots:[0,2,4,-3], tones:[5,12,17,10,19] },
  glacier: { name:"Glacier", color:"#8a93b8", bg:"#070810", base:50,
    pads:[ [-12,0,7],[-10,2,9],[-7,5,12],[-14,-2,5] ], roots:[0,2,5,-3], tones:[12,19,24,16,21] },
  embers:  { name:"Embers", color:"#b0866a", bg:"#0c0805", base:50,
    pads:[ [-19,-12,-5],[-17,-10,-3],[-15,-8,-1],[-22,-15,-8] ], roots:[0,2,4,-3], tones:[0,7,12,5,15] }
};
let sceneKey = "submers";
let curVoicing = SCENES.submers.pads[0];

// ---- modular layers ----
const M = {
  drone:   { name:"Drone",   on:true,  level:0.82, rev:0.85 },
  shimmer: { name:"Shimmer", on:true,  level:0.4,  rev:1.0  },
  bells:   { name:"Bells",   on:true,  level:0.55, rev:1.0  },
  sub:     { name:"Sub",     on:false, level:0.55, rev:0.25 },
  air:     { name:"Air",     on:true,  level:0.45, rev:0.4  },
  light:   { name:"Light",   on:false, level:0.4,  rev:0.9  }
};
const MOD_ORDER = ["drone","shimmer","bells","sub","air","light"];

const P = { movement:0.3, space:0.72, tape:0.5, vol:0.7, tide:false };

// ---- built-in presets ----
const PRESETS = {
  Submersion: { scene:"submers", p:{movement:0.24,space:0.8,tape:0.6,vol:0.7,tide:false},
    m:{ drone:[1,.85], shimmer:[1,.32], bells:[1,.5], sub:[1,.55], air:[1,.5], light:[0,.4] } },
  "Glass Rain": { scene:"glacier", p:{movement:0.55,space:0.86,tape:0.32,vol:0.68,tide:false},
    m:{ drone:[1,.6], shimmer:[1,.72], bells:[1,.8], sub:[0,.5], air:[1,.32], light:[1,.5] } },
  "Night Tide": { scene:"embers", p:{movement:0.2,space:0.76,tape:0.7,vol:0.7,tide:true},
    m:{ drone:[1,.82], shimmer:[1,.46], bells:[1,.34], sub:[1,.6], air:[1,.6], light:[1,.26] } }
};

// ---- bowl sample ----
let bowlBytes=null, bowlBuf=null;
const bowlReady = fetch("bowl.mp3").then(r=>{ if(!r.ok) throw 0; return r.arrayBuffer(); })
  .then(b=>{ bowlBytes=b; }).catch(()=>{ bowlBytes=null; });

// ---- audio graph ----
let ctx=null, playing=false, timers=[], tideTimer=null;
let master, comp, analyser, toneLP, dryBus, tapeSat, hissGain, reverbSend, reverbReturn, convolver;
let wowOut, wowGain, noiseBuf, chordIdx=0, streamDest=null, recorder=null, recChunks=[];
const rings=[];
let amp=0; // smoothed amplitude for visuals

function audbuf(sec){ return ctx.createBuffer(1, Math.max(1,Math.floor(ctx.sampleRate*sec)), ctx.sampleRate); }
function makeNoise(){ const b=audbuf(4); const d=b.getChannelData(0); let l=0; for(let i=0;i<d.length;i++){ const w=Math.random()*2-1; l=(l+0.02*w)/1.02; d[i]=l*3.2; } noiseBuf=b; }
function makeIR(sec,decay){ const len=Math.floor(ctx.sampleRate*sec); const b=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){ const d=b.getChannelData(ch); let lp=0; for(let i=0;i<len;i++){ const e=Math.pow(1-i/len,decay); const w=(Math.random()*2-1)*e; lp=lp*0.72+w*0.28; d[i]=lp; } } return b; }
function satCurve(amount){ const n=1024,c=new Float32Array(n),k=amount; for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=Math.tanh(k*x)/Math.tanh(k); } return c; }

function makeModule(key){
  const m=M[key];
  m.gain=ctx.createGain(); m.gain.gain.value = m.on? m.level : 0.0001;
  m.gain.connect(dryBus);
  m.rsend=ctx.createGain(); m.rsend.gain.value=m.rev; m.gain.connect(m.rsend); m.rsend.connect(reverbSend);
  // air bus carries a slow swell on top of the live fader
  if(key==="air"){ m.swellBus=ctx.createGain(); m.swellBus.connect(m.gain); }
}

function build(){
  const AC=window.AudioContext||window.webkitAudioContext;
  ctx=new AC();
  try{ if(navigator.audioSession) navigator.audioSession.type="playback"; }catch(e){}
  makeNoise();

  master=ctx.createGain(); master.gain.value=0.0001;
  comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-20; comp.knee.value=26; comp.ratio.value=2.4; comp.attack.value=0.1; comp.release.value=0.7;
  analyser=ctx.createAnalyser(); analyser.fftSize=1024; analyser.smoothingTimeConstant=0.85;

  comp.connect(master); master.connect(analyser); analyser.connect(ctx.destination);
  try{ streamDest=ctx.createMediaStreamDestination(); master.connect(streamDest); }catch(e){ streamDest=null; }

  toneLP=ctx.createBiquadFilter(); toneLP.type="lowpass"; toneLP.frequency.value=6500; toneLP.Q.value=0.3; toneLP.connect(comp);
  tapeSat=ctx.createWaveShaper(); tapeSat.oversample="2x"; tapeSat.curve=satCurve(1+P.tape*3); tapeSat.connect(toneLP);
  dryBus=ctx.createGain(); dryBus.connect(tapeSat);
  reverbReturn=ctx.createGain(); reverbReturn.gain.value=P.space; reverbReturn.connect(toneLP);
  convolver=ctx.createConvolver(); convolver.buffer=makeIR(11,3.2); convolver.connect(reverbReturn);
  reverbSend=ctx.createGain(); reverbSend.gain.value=1; reverbSend.connect(convolver);

  MOD_ORDER.forEach(makeModule);

  // tape wow
  wowOut=ctx.createGain();
  const wow=ctx.createOscillator(); wow.frequency.value=0.08; wowGain=ctx.createGain(); wowGain.gain.value=3+P.tape*6; wow.connect(wowGain); wowGain.connect(wowOut); wow.start();

  // tape hiss into the dry bus
  const hs=ctx.createBufferSource(); hs.buffer=noiseBuf; hs.loop=true;
  const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1400;
  hissGain=ctx.createGain(); hissGain.gain.value=0; hs.connect(hp); hp.connect(hissGain); hissGain.connect(dryBus); hs.start();

  // air bed: lowpassed noise with a breathing swell, into the air module
  const as=ctx.createBufferSource(); as.buffer=noiseBuf; as.loop=true;
  const alp=ctx.createBiquadFilter(); alp.type="lowpass"; alp.frequency.value=760; alp.Q.value=0.5;
  as.connect(alp); alp.connect(M.air.swellBus);
  M.air.swellBus.gain.value=0.05;
  const sw=ctx.createOscillator(); sw.frequency.value=0.035; const swg=ctx.createGain(); swg.gain.value=0.4; sw.connect(swg); swg.connect(M.air.swellBus.gain); sw.start();
  as.start();

  applyAll();
  const t=ctx.currentTime; master.gain.setValueAtTime(0.0001,t); master.gain.exponentialRampToValueAtTime(Math.max(0.001,P.vol),t+5);
}

function applyAll(){
  if(!ctx) return; const t=ctx.currentTime;
  master.gain.setTargetAtTime(Math.max(0.0001,P.vol),t,0.4);
  reverbReturn.gain.setTargetAtTime(P.space,t,0.5);
  tapeSat.curve=satCurve(1+P.tape*3);
  if(wowGain) wowGain.gain.setTargetAtTime(3+P.tape*6,t,0.5);
  if(hissGain) hissGain.gain.setTargetAtTime(P.tape*0.016,t,0.6);
  MOD_ORDER.forEach(k=>{ if(M[k].gain) M[k].gain.gain.setTargetAtTime(M[k].on?M[k].level:0.0001,t,0.5); });
}

async function decodeBowl(){ await bowlReady; if(!bowlBytes){ bowlBuf=null; return; } try{ bowlBuf=await ctx.decodeAudioData(bowlBytes.slice(0)); }catch(e){ bowlBuf=null; } }

// ---- voices ----
function bowlVoice(semis, when, dur, peak, dest, o){
  o=o||{};
  const g=ctx.createGain(); g.gain.value=0;
  const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=o.cutoff||(640+Math.random()*520); lp.Q.value=0.4;
  const stopAt=when+dur+0.1;
  if(bowlBuf){
    const src=ctx.createBufferSource(); src.buffer=bowlBuf; src.loop=true;
    const margin=0.4, span=Math.max(1,bowlBuf.duration-2*margin-2.4);
    src.loopStart=margin+Math.random()*span; src.loopEnd=src.loopStart+1.6+Math.random()*0.8;
    src.playbackRate.value=rate(semis); wowOut.connect(src.detune);
    src.connect(lp); src.start(when, src.loopStart); src.stop(stopAt);
  } else {
    const f=mtof(SCENES[sceneKey].base+semis);
    const a=ctx.createOscillator(),b=ctx.createOscillator(); a.type=b.type="sine"; a.frequency.value=f; b.frequency.value=f; a.detune.value=-4; b.detune.value=5;
    wowOut.connect(a.detune); wowOut.connect(b.detune); a.connect(lp); b.connect(lp); a.start(when); b.start(when); a.stop(stopAt); b.stop(stopAt);
  }
  lp.connect(g);
  const pan=ctx.createStereoPanner?ctx.createStereoPanner():null;
  if(pan){ pan.pan.value=o.pan!==undefined?o.pan:(Math.random()*0.9-0.45); g.connect(pan); pan.connect(dest); } else g.connect(dest);
  const atk=o.atk!==undefined?o.atk:(9+Math.random()*6), rel=o.rel!==undefined?o.rel:(13+Math.random()*8);
  g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(peak,when+atk);
  g.gain.setValueAtTime(peak,when+Math.max(atk+0.1,dur-rel)); g.gain.linearRampToValueAtTime(0.0001,when+dur);
}

// generative chord movement with voice-leading: keep the shape, walk the root
function nextChord(){
  if(!playing) return;
  const s=SCENES[sceneKey];
  const shape=s.pads[chordIdx % s.pads.length]; chordIdx++;
  curVoicing=shape;
  const dur=46+Math.random()*22, now=ctx.currentTime+0.05;
  shape.forEach((semis,i)=> bowlVoice(semis, now, dur, 0.07+Math.random()*0.02, M.drone.gain, { pan:(i-1)*0.35 }));
  timers.push(setTimeout(nextChord, dur*0.6*1000));
}

// bells: sparse single high tone
function bell(){
  if(!playing||!M.bells.on) return;
  const s=SCENES[sceneKey]; const semis=s.tones[Math.floor(Math.random()*s.tones.length)];
  bowlVoice(semis, ctx.currentTime+0.03, 12+Math.random()*5, 0.06, M.bells.gain,
    { atk:2+Math.random()*2.5, rel:7+Math.random()*5, cutoff:1500+Math.random()*1700, pan:Math.random()*1.2-0.6 });
}
function nextBell(){
  if(!playing) return;
  if(M.bells.on && Math.random()<0.55+P.movement*0.35) bell();
  const gap=(38-P.movement*26)*(0.7+Math.random()*0.8);
  timers.push(setTimeout(nextBell, Math.max(8,gap)*1000));
}

// shimmer: a continuous granular cloud of the bowl, an octave up, tracking the chord
function grain(){
  if(!bowlBuf) return;
  const note=curVoicing[Math.floor(Math.random()*curVoicing.length)];
  const semis=note+12+(Math.random()<0.3?7:0)+(Math.random()<0.15?12:0)+(Math.random()*2-1)*0.12;
  const src=ctx.createBufferSource(); src.buffer=bowlBuf;
  const margin=0.4, pos=margin+Math.random()*Math.max(0.2,bowlBuf.duration-2*margin-0.4);
  src.playbackRate.value=rate(semis);
  const g=ctx.createGain(); g.gain.value=0; src.connect(g);
  const pan=ctx.createStereoPanner?ctx.createStereoPanner():null; let out=g;
  if(pan){ pan.pan.value=Math.random()*1.7-0.85; g.connect(pan); out=pan; }
  out.connect(M.shimmer.gain);
  const now=ctx.currentTime+0.02, dur=0.26+Math.random()*0.24, peak=0.05;
  g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(peak,now+dur*0.5); g.gain.linearRampToValueAtTime(0.0001,now+dur);
  src.start(now,pos); src.stop(now+dur+0.05);
}
function shimmerTick(){
  if(!playing) return;
  if(M.shimmer.on) grain();
  timers.push(setTimeout(shimmerTick, 80+Math.random()*90));
}

// light: a soft, airy synth pad high above, slow crossfades (distinct timbre from the bowl)
function lightNote(when,dur){
  const top=Math.max(...curVoicing)+12; const f=mtof(SCENES[sceneKey].base+top);
  const a=ctx.createOscillator(),b=ctx.createOscillator(); a.type=b.type="sine"; a.frequency.value=f; b.frequency.value=f; a.detune.value=-6; b.detune.value=7;
  wowOut.connect(a.detune); wowOut.connect(b.detune);
  const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2200; const g=ctx.createGain(); g.gain.value=0;
  a.connect(lp); b.connect(lp); lp.connect(g);
  const pan=ctx.createStereoPanner?ctx.createStereoPanner():null; if(pan){ pan.pan.value=Math.random()*0.8-0.4; g.connect(pan); pan.connect(M.light.gain); } else g.connect(M.light.gain);
  const atk=8+Math.random()*5, rel=12+Math.random()*8, peak=0.04;
  g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(peak,when+atk); g.gain.setValueAtTime(peak,when+Math.max(atk+0.1,dur-rel)); g.gain.linearRampToValueAtTime(0.0001,when+dur);
  a.start(when); b.start(when); a.stop(when+dur+0.1); b.stop(when+dur+0.1);
}
function nextLight(){
  if(!playing) return;
  if(M.light.on) lightNote(ctx.currentTime+0.05, 26+Math.random()*16);
  timers.push(setTimeout(nextLight, (20+Math.random()*16)*1000));
}

// sub: heartbeat pulse from the bowl, pitched way down
function triggerSub(when){ bowlVoice(-19, when, 2.3, 0.5, M.sub.gain, { atk:0.12, rel:1.8, cutoff:120, pan:0 }); }
function pulse(){
  if(!playing) return;
  if(M.sub.on){ triggerSub(ctx.currentTime+0.03); rings.push({r:0,a:0.5}); }
  timers.push(setTimeout(pulse, (3.4*(0.92+Math.random()*0.16))*1000));
}

// tide: very slow self-evolving drift across brightness, space and movement
let tidePhase=0;
function tideTick(){
  if(!ctx) return;
  tidePhase+=0.013;
  if(P.tide){
    const b=Math.sin(tidePhase)*0.5+0.5;          // 0..1 slow
    toneLP.frequency.setTargetAtTime(4200+b*4200, ctx.currentTime, 3);
    reverbReturn.gain.setTargetAtTime(clamp(P.space+(b-0.5)*0.25,0,1), ctx.currentTime, 3);
  }
}

// ---- transport ----
async function start(){
  if(playing) return;
  orb.textContent="Loading"; orb.classList.add("live");
  build(); await decodeBowl();
  if(orb.textContent!=="Loading"){ return; }
  playing=true; chordIdx=0;
  nextChord();
  timers.push(setTimeout(nextBell,8000));
  timers.push(setTimeout(shimmerTick,3000));
  timers.push(setTimeout(nextLight,12000));
  timers.push(setTimeout(pulse,1500));
  tideTimer=setInterval(tideTick,1000);
  orb.textContent="Drifting"; panel.classList.add("show");
}
function stop(){
  playing=false;
  timers.forEach(clearTimeout); timers=[];
  if(tideTimer){ clearInterval(tideTimer); tideTimer=null; }
  if(recorder && recorder.state==="recording"){ try{ recorder.stop(); }catch(e){} }
  orb.textContent="Begin"; orb.classList.remove("live"); panel.classList.remove("show");
  if(!ctx) return;
  const c=ctx,t=ctx.currentTime; master.gain.cancelScheduledValues(t); master.gain.setValueAtTime(master.gain.value,t); master.gain.linearRampToValueAtTime(0.0001,t+2);
  setTimeout(()=>{ try{ c.close(); }catch(e){} },2200);
  ctx=null; bowlBuf=null;
}

// ---- recording ----
function pickMime(){ const opts=["audio/webm;codecs=opus","audio/webm","audio/mp4"]; for(const o of opts){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(o)) return o; } return null; }
function toggleRec(){
  const btn=document.getElementById("rec");
  if(!playing || !streamDest || !window.MediaRecorder){ btn.textContent="No record"; return; }
  if(recorder && recorder.state==="recording"){ recorder.stop(); return; }
  const mime=pickMime(); if(!mime){ btn.textContent="No record"; return; }
  recChunks=[]; recorder=new MediaRecorder(streamDest.stream,{ mimeType:mime });
  recorder.ondataavailable=e=>{ if(e.data.size) recChunks.push(e.data); };
  recorder.onstop=()=>{
    const blob=new Blob(recChunks,{type:mime}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); const ext=mime.indexOf("mp4")>=0?"m4a":"webm";
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");
    a.href=url; a.download=`driftloop-${sceneKey}-${stamp}.${ext}`; a.click(); setTimeout(()=>URL.revokeObjectURL(url),4000);
    btn.classList.remove("armed"); btn.textContent="Record";
  };
  recorder.start(); btn.classList.add("armed"); btn.textContent="Stop · save";
}

// ---- UI build ----
const orb=document.getElementById("orb");
const panel=document.getElementById("panel");
const scenesEl=document.getElementById("scenes");
const presetsEl=document.getElementById("presets");
const modsEl=document.getElementById("mods");

Object.keys(SCENES).forEach(k=>{ const b=document.createElement("button"); b.className="chip"; b.textContent=SCENES[k].name; b.dataset.k=k; b.onclick=()=>setScene(k); scenesEl.appendChild(b); });
function presetNames(){ const names=Object.keys(PRESETS); if(localStorage.getItem("driftloop:mine")) names.push("Mine"); return names; }
function renderPresets(){ presetsEl.innerHTML=""; presetNames().forEach(n=>{ const b=document.createElement("button"); b.className="chip"; b.textContent=n; b.onclick=()=>applyPreset(n); presetsEl.appendChild(b); }); }

MOD_ORDER.forEach(k=>{
  const m=M[k]; const row=document.createElement("div"); row.className="mod"+(m.on?"":" off"); row.dataset.k=k;
  const dot=document.createElement("button"); dot.className="dot"+(m.on?" on":""); dot.onclick=()=>toggleMod(k);
  const lab=document.createElement("label"); lab.textContent=m.name;
  const fad=document.createElement("input"); fad.type="range"; fad.min=0; fad.max=1; fad.step=0.01; fad.value=m.level; fad.dataset.k=k;
  fad.oninput=()=>{ m.level=parseFloat(fad.value); if(m.on && ctx) M[k].gain.gain.setTargetAtTime(m.level,ctx.currentTime,0.3); saveLast(); };
  row.appendChild(dot); row.appendChild(lab); row.appendChild(fad); modsEl.appendChild(row);
});
function toggleMod(k){ const m=M[k]; m.on=!m.on; const row=modsEl.querySelector(`.mod[data-k="${k}"]`); row.classList.toggle("off",!m.on); row.querySelector(".dot").classList.toggle("on",m.on); if(ctx) M[k].gain.gain.setTargetAtTime(m.on?m.level:0.0001,ctx.currentTime,0.5); saveLast(); }

function setScene(k){ sceneKey=k; [...scenesEl.children].forEach(c=>c.classList.toggle("on",c.dataset.k===k)); const s=SCENES[k]; document.documentElement.style.setProperty("--accent",s.color); document.body.style.background=s.bg; if(playing) chordIdx=0; saveLast(); }

function bind(id,key){ const el=document.getElementById(id); el.oninput=()=>{ P[key]=parseFloat(el.value); applyAll(); saveLast(); }; }
bind("movement","movement"); bind("space","space"); bind("tape","tape"); bind("vol","vol");
const tideDot=document.getElementById("tideDot");
function setTide(v){ P.tide=v; tideDot.classList.toggle("on",v); }
tideDot.onclick=()=>{ setTide(!P.tide); saveLast(); };

orb.onclick=()=>{ if(!playing && orb.textContent!=="Loading") start(); else stop(); };
document.getElementById("rec").onclick=toggleRec;
document.getElementById("save").onclick=()=>{ localStorage.setItem("driftloop:mine",JSON.stringify(snapshot())); renderPresets(); const b=document.getElementById("save"); b.textContent="Saved"; setTimeout(()=>b.textContent="Save mine",1400); };

// ---- config snapshot / apply / persist ----
function snapshot(){ const m={}; MOD_ORDER.forEach(k=>m[k]=[M[k].on?1:0,M[k].level]); return { scene:sceneKey, p:{...P}, m }; }
function applyConfig(c){
  if(c.scene && SCENES[c.scene]) sceneKey=c.scene;
  if(c.p) Object.assign(P,c.p);
  if(c.m) MOD_ORDER.forEach(k=>{ if(c.m[k]){ M[k].on=!!c.m[k][0]; M[k].level=c.m[k][1]; } });
  syncUI(); if(ctx) applyAll();
}
function applyPreset(n){ const c = n==="Mine"? JSON.parse(localStorage.getItem("driftloop:mine")) : PRESETS[n]; if(c){ applyConfig(c); saveLast(); } }
function syncUI(){
  setScene(sceneKey);
  document.getElementById("movement").value=P.movement; document.getElementById("space").value=P.space;
  document.getElementById("tape").value=P.tape; document.getElementById("vol").value=P.vol; setTide(P.tide);
  MOD_ORDER.forEach(k=>{ const row=modsEl.querySelector(`.mod[data-k="${k}"]`); if(!row) return; row.classList.toggle("off",!M[k].on); row.querySelector(".dot").classList.toggle("on",M[k].on); row.querySelector("input").value=M[k].level; });
}
function saveLast(){ try{ localStorage.setItem("driftloop:last",JSON.stringify(snapshot())); }catch(e){} }

// init from last session, else default preset
renderPresets();
(function init(){ const last=localStorage.getItem("driftloop:last"); if(last){ try{ applyConfig(JSON.parse(last)); return; }catch(e){} } applyConfig(PRESETS.Submersion); })();

// ---- generative visual driven by the audio ----
const cv=document.getElementById("bg"), g2=cv.getContext("2d");
let W,H; function resize(){ W=cv.width=innerWidth*devicePixelRatio; H=cv.height=innerHeight*devicePixelRatio; } resize(); addEventListener("resize",resize);
function hex(){ return getComputedStyle(document.documentElement).getPropertyValue("--accent").trim()||"#5f93a8"; }
function hexA(c,a){ return c+Math.floor(clamp(a,0,1)*255).toString(16).padStart(2,"0"); }
const dust=Array.from({length:60},()=>({x:Math.random(),y:Math.random(),z:0.3+Math.random()*0.7,s:Math.random()*Math.PI*2}));
let phase=0, td=new Uint8Array(1024);
function frame(){
  phase+=0.0011;
  // read amplitude
  if(analyser){ analyser.getByteTimeDomainData(td); let sum=0; for(let i=0;i<td.length;i++){ const v=(td[i]-128)/128; sum+=v*v; } amp=amp*0.9+Math.sqrt(sum/td.length)*0.1; }
  else amp*=0.95;
  const col=hex(); g2.clearRect(0,0,W,H);
  // drifting current bands
  for(let i=0;i<4;i++){ const y=H*(0.24+i*0.18)+Math.sin(phase+i*1.4)*H*0.05; const gr=g2.createLinearGradient(0,y-H*0.22,0,y+H*0.22); gr.addColorStop(0,"rgba(0,0,0,0)"); gr.addColorStop(0.5,hexA(col,playing?0.11:0.06)); gr.addColorStop(1,"rgba(0,0,0,0)"); g2.fillStyle=gr; g2.fillRect(0,y-H*0.22,W,H*0.44); }
  // breathing core that follows the sound
  const cx=W/2, cy=H/2; const base=Math.min(W,H)*0.13; const r=base*(1+amp*4)+Math.sin(phase*2)*base*0.06;
  const glow=g2.createRadialGradient(cx,cy,0,cx,cy,r*3.2); glow.addColorStop(0,hexA(col,playing?0.5:0.18)); glow.addColorStop(0.4,hexA(col,0.12)); glow.addColorStop(1,"rgba(0,0,0,0)");
  g2.fillStyle=glow; g2.beginPath(); g2.arc(cx,cy,r*3.2,0,Math.PI*2); g2.fill();
  g2.strokeStyle=hexA(col,0.5); g2.lineWidth=1.2*devicePixelRatio; g2.beginPath(); g2.arc(cx,cy,r,0,Math.PI*2); g2.stroke();
  // dust
  for(const p of dust){ p.s+=0.004*p.z; const x=(p.x*W + Math.cos(p.s)*22*p.z)%W, y=(p.y*H + Math.sin(p.s*0.7)*22*p.z + phase*30*p.z)%H; g2.fillStyle=hexA(col,0.05+p.z*0.06); g2.beginPath(); g2.arc(x,(y+H)%H,p.z*1.6*devicePixelRatio,0,Math.PI*2); g2.fill(); }
  // sonar rings on the pulse
  for(let i=rings.length-1;i>=0;i--){ const rr=rings[i]; rr.r+=W*0.0013; rr.a*=0.988; g2.beginPath(); g2.arc(cx,cy,rr.r,0,Math.PI*2); g2.strokeStyle=hexA(col,rr.a*0.5); g2.lineWidth=1.1*devicePixelRatio; g2.stroke(); if(rr.a<0.02||rr.r>W) rings.splice(i,1); }
  requestAnimationFrame(frame);
}
frame();
</script>
